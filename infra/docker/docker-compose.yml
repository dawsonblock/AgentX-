version: "3.8"

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/agentx
      - WORKTREE_ROOT=/var/lib/agentx/worktrees
    volumes:
      - worktrees:/var/lib/agentx/worktrees
      - ../../vendors:/app/vendors:ro
    depends_on:
      - db
    command: uvicorn runtime.api.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ui:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../../ui:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  postgres_data:
  worktrees:
